name: Build ObjectBox Viewer

on:
  push:
    tags:
      - 'v*'  # Push tags starting with 'v' to trigger build
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-macos-arm64:
    name: Build for macOS ARM64 (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build application
        run: |
          chmod +x build_macos_arm64.sh
          ./build_macos_arm64.sh

      - name: Create DMG (optional)
        run: |
          brew install create-dmg
          create-dmg \
            --volname "ObjectBox Viewer" \
            --volicon "dist/ObjectBoxViewer.app/Contents/Resources/app.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "ObjectBoxViewer.app" 150 190 \
            --hide-extension "ObjectBoxViewer.app" \
            --app-drop-link 400 190 \
            "dist/ObjectBoxViewer-ARM64.dmg" \
            "dist/ObjectBoxViewer.app" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ObjectBoxViewer-macOS-ARM64
          path: dist/ObjectBoxViewer.app
          retention-days: 30

  build-macos-intel:
    name: Build for macOS Intel (x86_64)
    runs-on: macos-26-intel  # Intel runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build application
        run: |
          chmod +x build_macos_intel.sh
          ./build_macos_intel.sh

      - name: Create DMG (optional)
        run: |
          brew install create-dmg
          create-dmg \
            --volname "ObjectBox Viewer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "ObjectBoxViewer.app" 150 190 \
            --hide-extension "ObjectBoxViewer.app" \
            --app-drop-link 400 190 \
            "dist/ObjectBoxViewer-Intel.dmg" \
            "dist/ObjectBoxViewer.app" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ObjectBoxViewer-macOS-Intel
          path: dist/ObjectBoxViewer.app
          retention-days: 30

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build application
        run: |
          .\build_windows.bat

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist\ObjectBoxViewer -DestinationPath dist\ObjectBoxViewer-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ObjectBoxViewer-Windows
          path: dist/ObjectBoxViewer-Windows.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-macos-arm64, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ObjectBoxViewer-macOS-ARM64/*
            artifacts/ObjectBoxViewer-macOS-Intel/*
            artifacts/ObjectBoxViewer-Windows/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
